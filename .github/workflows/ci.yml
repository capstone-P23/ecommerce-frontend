name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

# 같은 브랜치/PR 에서 새 커밋이 올라오면 진행 중인 워크플로 취소
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # CI 에서는 husky 설치 스킵 (.git/hooks 없음 / 불필요)
          HUSKY: 0

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Next.js 텔레메트리 비활성화
          NEXT_TELEMETRY_DISABLED: 1
